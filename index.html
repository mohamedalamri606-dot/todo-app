<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>To-Do App</h1>

  <!-- الإدخال -->
  <input type="text" id="taskInput" placeholder="اكتب مهمة">
  <button onclick="addTask()">Add</button>

  <!-- 🔥 العداد -->
  <p id="counter">عدد المهام: 0</p>

  <!-- 🔍 الفلترة -->
  <div>
    <button onclick="filterTasks('all')">الكل</button>
    <button onclick="filterTasks('done')">مكتملة</button>
    <button onclick="filterTasks('not')">غير مكتملة</button>
  </div>

  <!-- القائمة -->
  <ul id="taskList"></ul>

  <script src="script.js"></script>
</body>
</html>
